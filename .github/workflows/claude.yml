name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    # opened: auto-review new PRs; synchronize: respond to force-pushes only if @claude mentioned
    types: [opened]

concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on @claude mentions (issue/PR comments) or auto-review on PR open
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # Checkout required so Claude can read CLAUDE.md, source files, and run npm commands
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - uses: anthropics/claude-code-action@d59651bd82c48d81756854675ce4fa4d69722200 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # On PR open: auto-review against CLAUDE.md standards
          # On @claude mention: respond to the specific request
          claude_args: >-
            --max-turns 10
            --model claude-sonnet-4-6
            --append-system-prompt "You are reviewing a production-grade MCP server (ServalSheets). Follow CLAUDE.md rules strictly: minimal changes, no refactors while debugging, verify before claiming. Run npm run verify:safe to confirm any code changes."
