name: Documentation Validation

on:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - '.markdownlint.json'
      - '.cspell.json'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '*.md'
  schedule:
    # Run external link check every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: docs-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run docs:lint
        continue-on-error: false

      - name: Spell Check
        run: npm run docs:spell
        continue-on-error: true

      - name: Check Internal Links
        run: npm run docs:check-links
        continue-on-error: true

      - name: Build VitePress (validates structure)
        run: npm run docs:site

  link-check-external:
    name: Check External Links (Weekly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check External Links
        run: npm run docs:check-external-links
        continue-on-error: true
